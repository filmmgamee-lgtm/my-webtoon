<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สูตรสำเร็จฉบับอัลฟ่า — ตอนที่ 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0e0e0e;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(14,14,14,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #1e1e1e;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            text-decoration: none;
            font-size: 0.82rem;
            transition: color 0.15s;
        }
        .back-btn:hover { color: #00c73c; }
        .back-btn svg { flex-shrink: 0; }

        .topbar-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .topbar-ep {
            font-size: 0.75rem;
            color: #555;
        }

        /* Episode selector dropdown */
        .ep-select {
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            border-radius: 6px;
            color: #ccc;
            font-size: 0.8rem;
            padding: 6px 10px;
            outline: none;
            cursor: pointer;
        }
        .ep-select:focus { border-color: #00c73c; }

        /* ===== COMIC IMAGES ===== */
        .reader {
            max-width: 720px;
            margin: 0 auto;
        }

        .comic-page {
            width: 100%;
            display: block;
            /* รูปจะชิดกันเลย ไม่มีช่องว่าง */
            line-height: 0;
        }
        .comic-page img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* placeholder ตอนยังไม่มีรูป */
        .placeholder-page {
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #333;
            border-bottom: 1px solid #111;
        }
        .placeholder-page span {
            font-size: 0.8rem;
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            color: #ccc;
            font-size: 0.85rem;
            padding: 10px 18px;
            text-decoration: none;
            transition: all 0.15s;
            cursor: pointer;
        }
        .nav-btn:hover {
            border-color: #00c73c;
            color: #00c73c;
        }
        .nav-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .nav-btn.next {
            background: #00c73c;
            border-color: #00c73c;
            color: #000;
            font-weight: 700;
        }
        .nav-btn.next:hover {
            background: #00a832;
            color: #000;
        }

        .ep-info {
            font-size: 0.8rem;
            color: #444;
            text-align: center;
        }
    </style>
</head>
<body>
